name: helper_flutter
description: "Helper - 가정용 물품 관리 및 AI 음성 비서"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 네비게이션
  go_router: ^14.0.0

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.8.0+1

  # WebSocket
  web_socket_channel: ^3.0.2

  # OAuth
  flutter_web_auth_2: ^4.0.1

  # 로컬 저장소
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # 네이티브 오디오 녹음
  record: ^6.0.0
  permission_handler: ^11.4.0

  # 이미지
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.1

  # 유틸
  intl: ^0.20.2
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
